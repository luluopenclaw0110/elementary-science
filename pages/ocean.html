<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海洋世界 - 自然科學</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="cosmic-bg ocean" id="cosmicBg"></div>
    
    <header class="header">
        <div class="header-content">
            <a href="../index.html" class="back-btn">← 返回首頁</a>
            <div class="header-right">
                <div class="stars-counter">
                    <span class="star-icon">⭐</span>
                    <span id="totalStars">0</span> 星星
                </div>
            </div>
        </div>
    </header>

    <main class="main-content">
        <section class="page-header">
            <h1 class="page-title">🌊 海洋世界</h1>
            <p class="page-subtitle">探索神秘的海洋生態系！</p>
        </section>

        <section class="units-grid">
            <!-- 單元1：魚類分類 -->
            <div class="unit-card" id="unit-ocean-1">
                <div class="unit-header">
                    <span class="unit-number">單元 1</span>
                    <span class="unit-status" id="status-ocean-1">☆</span>
                </div>
                <h3 class="unit-title">🐟 魚類分類挑戰</h3>
                <p class="unit-desc">認識不同種類的魚，進行分類遊戲！</p>
                <button class="unit-play-btn" onclick="openGame('fish-classify')">開始遊戲</button>
            </div>

            <!-- 單元2：海底地形 -->
            <div class="unit-card" id="unit-ocean-2">
                <div class="unit-header">
                    <span class="unit-number">單元 2</span>
                    <span class="unit-status" id="status-ocean-2">☆</span>
                </div>
                <h3 class="unit-title">🏴 海洋地圖</h3>
                <p class="unit-desc">探索從海岸到深海的地形變化！</p>
                <button class="unit-play-btn" onclick="openGame('ocean-floor')">開始遊戲</button>
            </div>

            <!-- 單元3：珊瑚礁生態 -->
            <div class="unit-card" id="unit-ocean-3">
                <div class="unit-header">
                    <span class="unit-number">單元 3</span>
                    <span class="unit-status" id="status-ocean-3">☆</span>
                </div>
                <h3 class="unit-title">🪸 海洋生態鏈</h3>
                <p class="unit-desc">了解海洋生物之間的食物關係！</p>
                <button class="unit-play-btn" onclick="openGame('coral-reef')">開始遊戲</button>
            </div>
        </section>
    </main>

    <div class="game-modal" id="gameModal">
        <div class="game-container" id="gameContent"></div>
    </div>

    <script src="../js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            ScienceGame.loadProgress();
            ScienceGame.updateTotalStars();
        });

        function openGame(gameType) {
            const modal = document.getElementById('gameModal');
            const content = document.getElementById('gameContent');
            let gameHTML = '';
            
            switch(gameType) {
                case 'fish-classify':
                    gameHTML = createFishClassifyGame();
                    break;
                case 'ocean-floor':
                    gameHTML = createOceanFloorGame();
                    break;
                case 'coral-reef':
                    gameHTML = createCoralReefGame();
                    break;
            }
            
            content.innerHTML = gameHTML;
            modal.style.display = 'block';
            
            if (gameType === 'fish-classify') initFishClassifyGame();
            if (gameType === 'ocean-floor') initOceanFloorGame();
            if (gameType === 'coral-reef') initCoralReefGame();
        }

        function closeGame() {
            document.getElementById('gameModal').style.display = 'none';
        }

        // ===== 魚類分類遊戲 =====
        function createFishClassifyGame() {
            return `
                <h2 class="game-title">🐟 魚類分類挑戰</h2>
                <p class="game-instructions">把魚類按照特徵分組：暖水魚 / 冷水魚 / 熱帶魚</p>
                <div style="display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; margin-bottom: 20px;">
                    <div class="fish-zone" data-category="warm" style="width: 180px; min-height: 150px; border: 3px dashed #f39c12; border-radius: 15px; padding: 10px; text-align: center;">
                        <h4 style="color: #f39c12;">☀️ 暖水魚</h4>
                        <p style="font-size: 0.8rem; opacity: 0.7;">喜歡溫暖海水</p>
                        <div class="fish-container" style="min-height: 80px;"></div>
                    </div>
                    <div class="fish-zone" data-category="cold" style="width: 180px; min-height: 150px; border: 3px dashed #00cec9; border-radius: 15px; padding: 10px; text-align: center;">
                        <h4 style="color: #00cec9;">❄️ 冷水魚</h4>
                        <p style="font-size: 0.8rem; opacity: 0.7;">喜歡冰冷海水</p>
                        <div class="fish-container" style="min-height: 80px;"></div>
                    </div>
                    <div class="fish-zone" data-category="tropical" style="width: 180px; min-height: 150px; border: 3px dashed #e74c3c; border-radius: 15px; padding: 10px; text-align: center;">
                        <h4 style="color: #e74c3c;">🌴 熱帶魚</h4>
                        <p style="font-size: 0.8rem; opacity: 0.7;">色彩鮮豔美麗</p>
                        <div class="fish-container" style="min-height: 80px;"></div>
                    </div>
                </div>
                <div id="fish-tray" style="display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 20px;"></div>
                <div id="fish-result" style="text-align: center; font-size: 1.1rem;"></div>
                <button class="unit-play-btn" style="margin-top: 20px; background: #e74c3c;" onclick="closeGame()">關閉</button>
            `;
        }

        function initFishClassifyGame() {
            const fishes = [
                { name: '鮭魚', emoji: '🐟', category: 'cold', correct: 'cold' },
                { name: '鱈魚', emoji: '🐠', category: 'cold', correct: 'cold' },
                { name: '鯖魚', emoji: '🐡', category: 'warm', correct: 'warm' },
                { name: '吳郭魚', emoji: '🐟', category: 'warm', correct: 'warm' },
                { name: '小丑魚', emoji: '🐠', category: 'tropical', correct: 'tropical' },
                { name: '神仙魚', emoji: '🐟', category: 'tropical', correct: 'tropical' }
            ];
            
            const shuffled = ScienceGame.shuffle(fishes);
            const tray = document.getElementById('fish-tray');
            const zones = document.querySelectorAll('.fish-zone');
            let correctCount = 0;
            
            shuffled.forEach((fish, i) => {
                const el = document.createElement('div');
                el.className = 'fish-item';
                el.dataset.correct = fish.correct;
                el.style.cssText = `
                    padding: 8px 15px; background: linear-gradient(135deg, #74b9ff, #0984e3);
                    color: white; border-radius: 20px; cursor: grab;
                    font-weight: 700; display: flex; align-items: center; gap: 5px;
                `;
                el.innerHTML = `${fish.emoji} ${fish.name}`;
                
                ScienceGame.enableDrag(el, (dropped) => {
                    zones.forEach(zone => {
                        if (zone.contains(dropped)) {
                            const zoneCategory = zone.dataset.category;
                            const fishCorrect = dropped.dataset.correct;
                            
                            if (zoneCategory === fishCorrect) {
                                correctCount++;
                                document.getElementById('fish-result').innerHTML = `<span style="color: #27ae60;">✓ 正確！${correctCount} / 6</span>`;
                                dropped.style.background = 'linear-gradient(135deg, #00b894, #00cec9)';
                            } else {
                                document.getElementById('fish-result').innerHTML = `<span style="color: #e74c3c;">✗ 再想想看！</span>`;
                                // 移回托盤
                                setTimeout(() => {
                                    tray.appendChild(dropped);
                                    dropped.style.left = '';
                                    dropped.style.top = '';
                                }, 500);
                            }
                            
                            if (correctCount === 6) {
                                setTimeout(() => completeAndClose('ocean-1'), 1000);
                            }
                        }
                    });
                });
                
                tray.appendChild(el);
            });
        }

        // ===== 海底地形遊戲 =====
        function createOceanFloorGame() {
            return `
                <h2 class="game-title">🏴 海洋地圖探索</h2>
                <p class="game-instructions">點擊不同的海洋區域，學習海底地形！</p>
                <div style="position: relative; width: 100%; max-width: 600px; margin: 0 auto;">
                    <svg viewBox="0 0 600 300" style="width: 100%;">
                        <!-- 海水背景 -->
                        <rect x="0" y="0" width="600" height="150" fill="url(#oceanGradient)"/>
                        
                        <defs>
                            <linearGradient id="oceanGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                                <stop offset="0%" style="stop-color:#87CEEB"/>
                                <stop offset="100%" style="stop-color:#006994"/>
                            </linearGradient>
                            <linearGradient id="oceanFloorGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                                <stop offset="0%" style="stop-color:#f39c12"/>
                                <stop offset="30%" style="stop-color:#8b4513"/>
                                <stop offset="100%" style="stop-color:#1a1a2e"/>
                            </linearGradient>
                        </defs>
                        
                        <!-- 海底地形 -->
                        <path d="M0 150 L50 140 L100 145 L150 130 L200 135 L250 120 L300 140 L350 100 L400 120 L450 80 L500 60 L550 40 L600 50 L600 300 L0 300 Z" fill="url(#oceanFloorGradient)"/>
                        
                        <!-- 地形標記區 -->
                        <g class="ocean-zone" data-zone="shore" onclick="showOceanInfo('shore')" style="cursor: pointer;">
                            <rect x="0" y="120" width="100" height="30" fill="transparent"/>
                            <text x="50" y="145" text-anchor="middle" font-size="14" fill="white">🏖️ 海岸</text>
                        </g>
                        <g class="ocean-zone" data-zone="continental-shelf" onclick="showOceanInfo('continental-shelf')" style="cursor: pointer;">
                            <rect x="100" y="110" width="150" height="30" fill="transparent"/>
                            <text x="175" y="135" text-anchor="middle" font-size="14" fill="white">📐 大陸棚</text>
                        </g>
                        <g class="ocean-zone" data-zone="trench" onclick="showOceanInfo('trench')" style="cursor: pointer;">
                            <rect x="400" y="40" width="100" height="60" fill="transparent"/>
                            <text x="450" y="80" text-anchor="middle" font-size="14" fill="white">🕳️ 海溝</text>
                        </g>
                        <g class="ocean-zone" data-zone="abyss" onclick="showOceanInfo('abyss')" style="cursor: pointer;">
                            <rect x="500" y="30" width="100" height="50" fill="transparent"/>
                            <text x="550" y="60" text-anchor="middle" font-size="14" fill="white">🕳️ 深淵</text>
                        </g>
                        
                        <!-- 魚類裝飾 -->
                        <text x="200" y="60" font-size="24">🐟</text>
                        <text x="300" y="40" font-size="20">🐠</text>
                        <text x="400" y="70" font-size="18">🦈</text>
                        
                        <!-- 深度標尺 -->
                        <line x1="580" y1="150" x2="580" y2="300" stroke="white" stroke-width="2"/>
                        <text x="590" y="160" font-size="10" fill="white">0m</text>
                        <text x="590" y="220" font-size="10" fill="white">200m</text>
                        <text x="590" y="290" font-size="10" fill="white">4000m</text>
                    </svg>
                </div>
                <div id="ocean-info" style="background: linear-gradient(135deg, #0984e3, #00cec9); padding: 15px; border-radius: 15px; margin-top: 20px; text-align: center; color: white;">
                    <p>👆 點擊上方的地形區域，了解海底地形！</p>
                    <p>已探索：<span id="ocean-explored">0</span> / 4</p>
                </div>
                <button class="unit-play-btn" style="margin-top: 20px; background: #e74c3c;" onclick="closeGame()">關閉</button>
            `;
        }

        let oceanExplored = 0;
        const oceanInfoData = {
            shore: { title: '🏖️ 海岸', desc: '海洋和陸地相連的地方，陽光充足，生物很多！退潮時會露出潮間帶，是小螃蟹和貝殼的家。' },
            'continental-shelf': { title: '📐 大陸棚', desc: '從海岸緩慢傾斜下去的海底區域，深度通常不超過200公尺。這裡魚類豐富，是重要的漁場！' },
            trench: { title: '🕳️ 海溝', desc: '海洋中最深的地方，深度可以超過10000公尺！馬里亞納海溝是地球最深的海溝。' },
            abyss: { title: '🌑 深淵', desc: '海洋最深處，陽光照不到，非常寒冷。這裡住著奇特的生物，如深海琵琶魚！' }
        };

        function initOceanFloorGame() {
            oceanExplored = 0;
            document.getElementById('ocean-explored').textContent = '0';
        }

        function showOceanInfo(zone) {
            const info = oceanInfoData[zone];
            const container = document.getElementById('ocean-info');
            container.innerHTML = `
                <h3>${info.title}</h3>
                <p>${info.desc}</p>
                <p style="margin-top: 10px;">已探索：<span id="ocean-explored">${++oceanExplored}</span> / 4</p>
            `;
            
            // 高亮效果
            document.querySelectorAll('.ocean-zone').forEach(z => {
                z.style.opacity = '0.5';
            });
            document.querySelector(`[data-zone="${zone}"]`).style.opacity = '1';
            
            if (oceanExplored >= 4) {
                setTimeout(() => {
                    container.innerHTML = '<span style="color: #ffeaa7;">🎉 太棒了！你現在了解海底地形了！</span>';
                    setTimeout(() => completeAndClose('ocean-2'), 1500);
                }, 1000);
            }
        }

        // ===== 珊瑚礁生態遊戲 =====
        function createCoralReefGame() {
            return `
                <h2 class="game-title">🪸 海洋生態鏈</h2>
                <p class="game-instructions">點擊箭頭，建立正確的食物鏈關係！</p>
                <div style="background: linear-gradient(to bottom, #87CEEB 0%, #006994 100%); border-radius: 20px; padding: 30px; min-height: 400px; position: relative;">
                    <!-- 珊瑚礁場景 -->
                    <div style="position: absolute; bottom: 20px; left: 0; right: 0; display: flex; justify-content: center; gap: 20px;">
                        <span style="font-size: 3rem;">🪸</span>
                        <span style="font-size: 2.5rem;">🪸</span>
                        <span style="font-size: 3rem;">🪸</span>
                    </div>
                    
                    <!-- 生態鏈區 -->
                    <div id="food-chain-area" style="display: flex; flex-direction: column; align-items: center; gap: 20px; padding-top: 20px;">
                        <!-- 浮游植物 -->
                        <div class="chain-item" data-level="producer" onclick="selectChainItem(this)" style="padding: 15px 30px; background: #27ae60; color: white; border-radius: 20px; cursor: pointer; font-weight: 700;">
                            🌿 浮游植物（生產者）
                        </div>
                        
                        <div style="font-size: 2rem;">⬇️</div>
                        
                        <!-- 浮游動物 -->
                        <div class="chain-item" data-level="primary" onclick="selectChainItem(this)" style="padding: 15px 30px; background: #f39c12; color: white; border-radius: 20px; cursor: pointer; font-weight: 700;">
                            🦐 浮游動物（初級消費者）
                        </div>
                        
                        <div style="font-size: 2rem;">⬇️</div>
                        
                        <!-- 小魚 -->
                        <div class="chain-item" data-level="secondary" onclick="selectChainItem(this)" style="padding: 15px 30px; background: #e74c3c; color: white; border-radius: 20px; cursor: pointer; font-weight: 700;">
                            🐟 小魚（次級消費者）
                        </div>
                        
                        <div style="font-size: 2rem;">⬇️</div>
                        
                        <!-- 大魚 -->
                        <div class="chain-item" data-level="tertiary" onclick="selectChainItem(this)" style="padding: 15px 30px; background: #9b59b6; color: white; border-radius: 20px; cursor: pointer; font-weight: 700;">
                            🦈 大魚（頂級消費者）
                        </div>
                    </div>
                </div>
                
                <div id="chain-info" style="background: #ffeaa7; padding: 15px; border-radius: 15px; margin-top: 20px; text-align: center;">
                    <p>👆 從上到下點擊每個層級，學習食物鏈的順序！</p>
                    <p>了解層級：<span id="chain-learned">0</span> / 4</p>
                </div>
                
                <div id="chain-result" style="text-align: center; margin-top: 15px;"></div>
                <button class="unit-play-btn" style="margin-top: 20px; background: #e74c3c;" onclick="closeGame()">關閉</button>
            `;
        }

        let chainLearned = 0;
        const chainInfo = {
            producer: '🌿 生產者：浮游植物透過陽光製造食物，是海洋生態系的基礎！',
            primary: '🦐 初級消費者：浮游動物吃浮游植物，獲得能量！',
            secondary: '🐟 次級消費者：小魚吃浮游動物，能量繼續傳遞！',
            tertiary: '🦈 頂級消費者：大魚吃小魚，位於食物鏈頂端！'
        };

        function initCoralReefGame() {
            chainLearned = 0;
            document.getElementById('chain-learned').textContent = '0';
        }

        function selectChainItem(el) {
            const level = el.dataset.level;
            
            if (el.style.transform === 'scale(1.1)') return; // 已選擇
            
            el.style.transform = 'scale(1.1)';
            el.style.boxShadow = '0 0 20px rgba(255,255,255,0.5)';
            
            chainLearned++;
            document.getElementById('chain-learned').textContent = chainLearned;
            
            const info = document.getElementById('chain-info');
            info.innerHTML = `<p>${chainInfo[level]}</p><p>了解層級：<span id="chain-learned">${chainLearned}</span> / 4</p>`;
            
            if (chainLearned >= 4) {
                document.getElementById('chain-result').innerHTML = '<span style="color: #27ae60; font-size: 1.2rem;">🎉 太棒了！你學會海洋食物鏈了！</span>';
                setTimeout(() => completeAndClose('ocean-3'), 1500);
            }
        }

        function completeAndClose(unitId) {
            ScienceGame.completeUnit(unitId, 'ocean');
            closeGame();
        }
    </script>
    <style>
        .game-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 200;
            overflow-y: auto;
            padding: 20px;
        }
        .fish-item {
            touch-action: none;
        }
        .chain-item {
            transition: all 0.3s;
        }
    </style>
</body>
</html>
